scheduler:
  strategy: "adaptive"
  max_retries: 3
  timeout_seconds: 20
  eviction:
    error_rate: 0.2
    p90_latency_ms: 1200
    cool_down_sec: 300

task_profiles:
  trading:
    priority: ["low_latency", "reliability"]
    candidate_tags: ["trading"]
  analysis:
    priority: ["throughput", "context"]
    candidate_tags: ["analysis"]
  text:
    priority: ["quality", "free"]
    candidate_tags: ["text"]
