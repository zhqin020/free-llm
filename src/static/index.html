<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeLLM Router | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: hsl(222, 47%, 11%);
            --card-bg: hsla(222, 47%, 15%, 0.8);
            --accent-primary: hsl(199, 89%, 48%);
            --accent-secondary: hsl(263, 70%, 50%);
            --status-healthy: hsl(142, 71%, 45%);
            --status-unstable: hsl(0, 72%, 51%);
            --status-cooling: hsl(48, 96%, 53%);
            --text-main: hsl(0, 0%, 98%);
            --text-dim: hsl(215, 20%, 65%);
            --border-glow: hsla(199, 89%, 48%, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            background-image: 
                radial-gradient(circle at 10% 20%, hsla(199, 89%, 48%, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, hsla(263, 70%, 50%, 0.05) 0%, transparent 40%);
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid hsla(0, 0%, 100%, 0.1);
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls { display: flex; gap: 1rem; }

        button {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            border: 1px solid hsla(0, 0%, 100%, 0.1);
            background: var(--card-bg);
            color: var(--text-main);
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        button:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px var(--border-glow);
            transform: translateY(-2px);
        }

        button.primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .section-header {
            grid-column: 1 / -1;
            margin: 2rem 0 1rem;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-dim);
            border-left: 4px solid var(--accent-primary);
            padding-left: 1rem;
        }

        .provider-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid hsla(0, 0%, 100%, 0.05);
            backdrop-filter: blur(12px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .provider-card:hover { transform: scale(1.02); border-color: hsla(199, 89%, 48%, 0.3); }

        .provider-link {
            color: inherit;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .provider-link:hover {
            color: var(--accent-primary);
            border-bottom-color: var(--accent-primary);
            text-shadow: 0 0 10px var(--border-glow);
        }

        .provider-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .status-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-weight: 700;
        }

        .status-healthy { background: hsla(142, 71%, 45%, 0.2); color: var(--status-healthy); }
        .status-unstable { background: hsla(0, 72%, 51%, 0.2); color: var(--status-unstable); }
        .status-cooling_down { background: hsla(48, 96%, 53%, 0.2); color: var(--status-cooling); }
        .status-rate_limited { background: hsla(0, 100%, 50%, 0.2); color: #ff3333; border: 1px solid hsla(0, 100%, 50%, 0.4); }
        .status-incomplete { background: hsla(0, 0%, 100%, 0.1); color: var(--text-dim); border: 1px dashed var(--text-dim); }
        .cooldown-alert {
            background: hsla(0, 72%, 51%, 0.1);
            border: 1px solid hsla(0, 72%, 51%, 0.3);
            border-radius: 8px;
            padding: 0.8rem;
            margin-bottom: 1.5rem;
            color: #ff4d4d;
            font-size: 0.85rem;
            display: none;
            align-items: center;
            gap: 0.8rem;
        }
        .cooldown-alert.show { display: flex; }

        .quota-info { font-size: 0.8rem; margin-bottom: 1rem; }
        .quota-bar-container {
            height: 6px;
            background: hsla(0, 0%, 100%, 0.1);
            border-radius: 3px;
            margin: 0.4rem 0 0.8rem;
            overflow: hidden;
        }
        .quota-bar { height: 100%; background: var(--accent-primary); transition: width 0.3s ease; }

        .metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            padding: 0.75rem;
            background: hsla(0, 0%, 0%, 0.2);
            border-radius: 12px;
        }

        .metric-item { display: flex; flex-direction: column; gap: 0.2rem; }
        .metric-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; }
        .metric-value { font-size: 0.9rem; font-weight: 600; }

        .model-list { display: flex; flex-wrap: wrap; gap: 0.4rem; }
        .model-tag {
            font-size: 0.7rem;
            padding: 0.15rem 0.4rem;
            background: hsla(0, 0%, 100%, 0.05);
            border-radius: 4px;
            color: var(--text-dim);
            border: 1px solid hsla(0, 0%, 100%, 0.05);
        }
        .model-tag.free { border-color: hsla(142, 71%, 45%, 0.3); color: var(--status-healthy); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 2000; align-items: center; justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--bg-color);
            border: 1px solid var(--accent-primary);
            padding: 2rem; border-radius: 16px;
            width: 90%; max-width: 500px;
            box-shadow: 0 0 30px var(--border-glow);
        }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-size: 0.8rem; color: var(--text-dim); }
        .form-group input {
            width: 100%; padding: 0.6rem;
            background: hsla(0, 0%, 0%, 0.3);
            border: 1px solid hsla(0, 0%, 100%, 0.1);
            border-radius: 6px; color: var(--text-main);
        }

        .live-indicator {
            width: 8px; height: 8px; background: var(--status-healthy);
            border-radius: 50%; display: inline-block; margin-right: 0.5rem;
            box-shadow: 0 0 10px var(--status-healthy); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        #notification {
            position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 2rem;
            background: var(--card-bg); border: 1px solid var(--accent-primary);
            border-radius: 12px; transform: translateY(200%); transition: transform 0.3s ease;
            z-index: 1001;
        }
        #notification.show { transform: translateY(0); }

        .loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            transform: translateX(-100%); transition: transform 0.5s ease; z-index: 3000;
        }
        .loader.active { transform: translateX(0); }
    </style>
</head>
<body>
    <div id="loader" class="loader"></div>
    <header>
        <div>
            <h1>FreeLLM Router</h1>
            <p style="color: var(--text-dim); font-size: 0.9rem;">
                <span class="live-indicator"></span>Adaptive Resource Monitoring
            </p>
        </div>
        <div class="controls">
            <button onclick="syncResources()">Sync Resources</button>
            <button class="primary" onclick="refreshData()">Refresh</button>
        </div>
    </header>

    <main class="stats-grid" id="provider-grid"></main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 1.5rem;" id="modal-title">Edit Provider</h2>
            <div class="form-group">
                <label>API Key</label>
                <input type="text" id="edit-key">
            </div>
            <div class="form-group">
                <label>Developer/Website URL (for clicking name)</label>
                <input type="text" id="edit-url">
            </div>
            <div class="form-group">
                <label>API Endpoint URL (for LLM requests)</label>
                <input type="text" id="edit-api-url">
            </div>
            <div class="form-group">
                <label>Price per 1k tokens ($)</label>
                <input type="number" step="0.0001" id="edit-price">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>Max Quota/Min</label>
                    <input type="number" id="edit-quota-min">
                </div>
                <div class="form-group">
                    <label>Max Quota/Day</label>
                    <input type="number" id="edit-quota-day">
                </div>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                <button onclick="closeModal()">Cancel</button>
                <button class="primary" onclick="saveProviderChanges()">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- API Test Modal -->
    <div id="test-modal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <h2 style="margin-bottom: 1rem;" id="test-modal-title">API Test</h2>
            
            <div id="test-cooldown-alert" class="cooldown-alert">
                <span style="font-size: 1.2rem;">⏳</span>
                <div>
                    <strong>Rate Limited:</strong> 
                    This provider is currently in adaptive cooldown. 
                    Retry available in <span id="test-cooldown-timer">0</span>s.
                </div>
            </div>

            <div class="form-group">
                <label>Test API Endpoint</label>
                <input type="text" id="test-url">
            </div>
            <div class="form-group">
                <label>Model ID</label>
                <input type="text" id="test-model" list="test-model-options" placeholder="Select or type model ID...">
                <datalist id="test-model-options"></datalist>
            </div>
            <div class="form-group">
                <label>Test Message</label>
                <textarea id="test-message" rows="3" style="width: 100%; background: hsla(0, 0%, 0%, 0.3); border: 1px solid hsla(0, 0%, 100%, 0.1); border-radius: 6px; color: var(--text-main); padding: 0.6rem; font-family: inherit; resize: vertical;"></textarea>
            </div>
            
            <div id="test-result-container" style="display: none; margin-top: 1rem; padding: 1rem; background: hsla(0, 0%, 0%, 0.3); border-radius: 8px; border: 1px solid hsla(0, 0%, 100%, 0.05); position: relative;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <label style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;">Result</label>
                    <button id="btn-copy-test" style="font-size: 0.6rem; padding: 0.2rem 0.6rem; background: hsla(0, 0%, 100%, 0.1); display: flex; align-items: center; gap: 0.3rem;" onclick="copyTestResult()">
                        <span>📋</span> Copy
                    </button>
                </div>
                <div id="test-result" style="font-size: 0.9rem; white-space: pre-wrap; max-height: 250px; overflow-y: auto;"></div>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                <button onclick="closeTestModal()">Close</button>
                <button id="btn-update-url" style="display: none; border-color: var(--status-healthy);" onclick="applyTestUrl()">Use this URL</button>
                <button class="primary" id="btn-run-test" onclick="runApiTest()">Run Test</button>
            </div>
        </div>
    </div>

    <div id="notification"></div>

    <script>
        let currentEditingProvider = '';
        let allProvidersData = [];

        async function refreshData() {
            setLoader(true);
            try {
                const response = await fetch('/v1/providers');
                allProvidersData = await response.json();
                renderProviders(allProvidersData);
            } catch (err) {
                showNotification("Failed to fetch data", "error");
            } finally {
                setTimeout(() => setLoader(false), 300);
            }
        }

        function renderProviders(providers) {
            try {
                const grid = document.getElementById('provider-grid');
                if (!grid) return;
                
                const freeOnes = providers.filter(p => p.free);
                const paidOnes = providers.filter(p => !p.free).sort((a,b) => a.token_price_1k - b.token_price_1k);

                let html = '';
                if (freeOnes.length > 0) {
                    html += '<div class="section-header">Free Resources</div>';
                    html += freeOnes.map(p => renderCard(p)).join('');
                }
                if (paidOnes.length > 0) {
                    html += '<div class="section-header">Paid Resources (Sorted by Price)</div>';
                    html += paidOnes.map(p => renderCard(p)).join('');
                }
                grid.innerHTML = html;
            } catch (err) {
                console.error("Render error:", err);
                showNotification("Error rendering UI: " + err.message, "error");
            }
        }

        function renderCard(p) {
            const minPct = p.max_quota_min > 0 ? (p.current_quota_min / p.max_quota_min) * 100 : 0;
            const dayPct = p.max_quota_day > 0 ? (p.current_quota_day / p.max_quota_day) * 100 : 0;

            return `
                <div class="provider-card" style="${!p.is_functional ? 'border-color: hsla(0, 72%, 51%, 0.3);' : ''}">
                    <div class="provider-header">
                        <div style="font-size: 1.2rem; font-weight: 600;">
                            ${p.url ? `<a href="${p.url}" target="_blank" class="provider-link" title="Open API Management Page">${p.name}</a>` : p.name}
                            ${!p.is_functional ? '<span class="status-badge status-incomplete" title="Missing API Key or invalid URL" style="margin-left: 0.5rem; vertical-align: middle;">Incomplete</span>' : ''}
                        </div>
                        ${(() => {
                            const now = Date.now() / 1000;
                            if (p.cool_down_until && p.cool_down_until > now) {
                                const remaining = Math.ceil(p.cool_down_until - now);
                                return `<span class="status-badge status-rate_limited" title="API Quota Exhausted">Rate Limited (${remaining}s)</span>`;
                            }
                            return `<span class="status-badge status-${p.status}">${p.status.replace('_', ' ')}</span>`;
                        })()}
                    </div>

                    <div class="quota-info">
                        <div style="display: flex; justify-content: space-between;">
                            <span>Minute Quota</span>
                            <span>${p.max_quota_min > 0 ? `${p.current_quota_min}/${p.max_quota_min}` : 'Unlimited'}</span>
                        </div>
                        <div class="quota-bar-container"><div class="quota-bar" style="width: ${minPct}%"></div></div>
                        <div style="display: flex; justify-content: space-between; margin-top: 0.4rem;">
                            <span>Daily Quota</span>
                            <span>${p.max_quota_day > 0 ? `${p.current_quota_day}/${p.max_quota_day}` : 'Unlimited'}</span>
                        </div>
                        <div class="quota-bar-container"><div class="quota-bar" style="width: ${dayPct}%"></div></div>
                    </div>

                    <div class="metrics">
                        <div class="metric-item">
                            <span class="metric-label">Latency</span>
                            <span class="metric-value">${p.p99_latency ? p.p99_latency.toFixed(0) + 'ms' : 'N/A'}</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">Error Rate</span>
                            <span class="metric-value">${(p.avg_error_rate * 100).toFixed(1)}%</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">Price/1k</span>
                            <span class="metric-value">${p.free ? 'Free' : '$'+p.token_price_1k.toFixed(4)}</span>
                        </div>
                    </div>

                    <div class="model-list">
                        ${(p.models || []).slice(0, 6).map(m => `
                            <span class="model-tag ${m.free ? 'free' : ''}">${(m.id || '').split('/').pop()}</span>
                        `).join('')}
                        ${p.models.length > 6 ? `<span class="model-tag">+${p.models.length - 6}</span>` : ''}
                    </div>

                    <div style="margin-top: 1.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
                        <button style="font-size: 0.7rem; padding: 0.4rem 0.8rem;" 
                            onclick="openEditModal('${p.name}', '${p.api_key}', '${p.url}', '${p.api_url}', ${p.token_price_1k}, ${p.max_quota_min}, ${p.max_quota_day})">
                            Edit
                        </button>
                        <button style="font-size: 0.7rem; padding: 0.4rem 0.8rem;" 
                            onclick="openTestModal('${p.name}', '${p.api_key}', '${p.api_url}', '${p.models[0]?.id || ''}')">
                            Test API
                        </button>
                        <button style="font-size: 0.7rem; padding: 0.4rem 0.8rem; background: var(--accent-primary); color: white;" 
                            onclick="probeModels('${p.name}')">
                            Refresh Models
                        </button>
                        <button style="font-size: 0.7rem; padding: 0.4rem 0.8rem;" 
                            onclick="providerAction('${p.name}', '${p.status === 'unstable' ? 'enable' : 'disable'}')">
                            ${p.status === 'unstable' ? 'Restore' : 'Isolate'}
                        </button>
                    </div>
                </div>
            `;
        }

        function openEditModal(name, key, url, apiUrl, price, qMin, qDay) {
            currentEditingProvider = name;
            document.getElementById('modal-title').innerText = `Edit ${name}`;
            document.getElementById('edit-key').value = (key && key !== 'undefined') ? key : '';
            document.getElementById('edit-url').value = (url && url !== 'undefined') ? url : '';
            document.getElementById('edit-api-url').value = (apiUrl && apiUrl !== 'undefined') ? apiUrl : '';
            document.getElementById('edit-price').value = price || 0;
            document.getElementById('edit-quota-min').value = qMin || 0;
            document.getElementById('edit-quota-day').value = qDay || 0;
            document.getElementById('modal').classList.add('show');
        }

        function closeModal() { document.getElementById('modal').classList.remove('show'); }

        let testProviderData = {};

        function openTestModal(name, key, url, modelId) {
            testProviderData = { name, key, originalUrl: url };
            document.getElementById('test-modal-title').innerText = `Test API: ${name}`;
            document.getElementById('test-url').value = (url && url !== 'undefined') ? url : '';
            document.getElementById('test-model').value = modelId;
            document.getElementById('test-message').value = "Say 'Hello, I am working!' if you can hear me.";
            document.getElementById('test-result-container').style.display = 'none';
            document.getElementById('btn-update-url').style.display = 'none';

            // Populate model datalist
            const datalist = document.getElementById('test-model-options');
            datalist.innerHTML = '';
            const provider = allProvidersData.find(p => p.name === name);
            if (provider && provider.models) {
                provider.models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    datalist.appendChild(opt);
                });
            }

            // Check for cooldown
            const alert = document.getElementById('test-cooldown-alert');
            const timer = document.getElementById('test-cooldown-timer');
            const now = Date.now() / 1000;
            if (provider && provider.cool_down_until && provider.cool_down_until > now) {
                alert.classList.add('show');
                const updateTimer = () => {
                    const rem = Math.ceil(provider.cool_down_until - (Date.now() / 1000));
                    if (rem > 0) {
                        timer.innerText = rem;
                        setTimeout(updateTimer, 1000);
                    } else {
                        alert.classList.remove('show');
                    }
                };
                updateTimer();
            } else {
                alert.classList.remove('show');
            }

            document.getElementById('test-modal').classList.add('show');
        }

        async function copyTestResult() {
            const resultText = document.getElementById('test-result').innerText;
            if (!resultText) return;
            
            try {
                await navigator.clipboard.writeText(resultText);
                const btn = document.getElementById('btn-copy-test');
                const originalContent = btn.innerHTML;
                btn.innerHTML = '<span>✅</span> Copied!';
                btn.style.borderColor = 'var(--status-healthy)';
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.style.borderColor = '';
                }, 2000);
            } catch (err) {
                showNotification("Failed to copy", "error");
            }
        }

        function closeTestModal() { document.getElementById('test-modal').classList.remove('show'); }

        async function runApiTest() {
            const runner = document.getElementById('btn-run-test');
            runner.innerText = "Testing...";
            runner.disabled = true;
            
            const payload = {
                provider_name: testProviderData.name,
                url: document.getElementById('test-url').value,
                api_key: testProviderData.key,
                model_id: document.getElementById('test-model').value,
                message: document.getElementById('test-message').value
            };

            try {
                const res = await fetch('/admin/providers/test', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                document.getElementById('test-result-container').style.display = 'block';
                const resultArea = document.getElementById('test-result');
                
                if (res.ok && data.status === "success") {
                    resultArea.innerText = data.response;
                    resultArea.style.color = "var(--status-healthy)";
                    if (payload.url !== testProviderData.originalUrl) {
                        document.getElementById('btn-update-url').style.display = 'block';
                    }
                } else {
                    resultArea.innerText = data.detail || (data.status === "error" ? data.detail : "Test failed");
                    resultArea.style.color = "var(--status-unstable)";
                }
            } catch (err) {
                showNotification("Test request failed", "error");
            } finally {
                runner.innerText = "Run Test";
                runner.disabled = false;
            }
        }

        async function applyTestUrl() {
            const newUrl = document.getElementById('test-url').value;
            try {
                const res = await fetch('/admin/providers/update', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name: testProviderData.name, api_url: newUrl })
                });
                if (res.ok) {
                    showNotification("URL updated successfully");
                    closeTestModal();
                    refreshData();
                }
            } catch (err) { showNotification("Update failed", "error"); }
        }

        async function saveProviderChanges() {
            const val = (id) => document.getElementById(id).value;
            const payload = {
                name: currentEditingProvider,
                api_key: val('edit-key'),
                url: val('edit-url'),
                api_url: val('edit-api-url'),
                token_price_1k: val('edit-price') ? parseFloat(val('edit-price')) : 0,
                max_quota_min: val('edit-quota-min') ? parseInt(val('edit-quota-min')) : 0,
                max_quota_day: val('edit-quota-day') ? parseInt(val('edit-quota-day')) : 0
            };
            try {
                const res = await fetch('/admin/providers/update', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    showNotification(`Updated ${currentEditingProvider}`);
                    closeModal();
                    refreshData();
                } else {
                    const err = await res.json();
                    showNotification(err.detail || "Update failed", "error");
                }
            } catch (err) {
                showNotification("Network error", "error");
            }
        }

        async function providerAction(name, action) {
            try {
                const res = await fetch('/admin/providers/action', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({provider: name, action: action})
                });
                if (res.ok) {
                    showNotification(`${name} marked as ${action === 'enable' ? 'healthy' : 'unstable'}`);
                    refreshData();
                }
            } catch (err) { showNotification("Action failed", "error"); }
        }

        async function syncResources() {
            setLoader(true);
            try {
                const res = await fetch('/admin/providers/sync', {method: 'POST'});
                const data = await res.json();
                showNotification(`Synced ${data.synced_providers} providers!`);
                refreshData();
            } catch (err) { showNotification("Sync failed", "error"); }
            finally { setLoader(false); }
        }

        async function probeModels(name) {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = 'Refreshing...';
            btn.disabled = true;

            try {
                const resp = await fetch('/admin/providers/probe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ provider_name: name })
                });
                const result = await resp.json();
                if (result.status === 'success') {
                    showNotification(`Success! Discovered ${result.discovered_count} new models for ${name}.`);
                    refreshData();
                } else {
                    showNotification('Discovery failed: ' + (result.detail || result.error), "error");
                }
            } catch (e) {
                showNotification('Connection error: ' + e, "error");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function setLoader(active) { document.getElementById('loader').classList.toggle('active', active); }

        function showNotification(msg, type = "success") {
            const n = document.getElementById('notification');
            n.innerText = msg;
            n.style.borderColor = type === "error" ? "var(--status-unstable)" : "var(--accent-primary)";
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 3000);
        }

        refreshData();
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
